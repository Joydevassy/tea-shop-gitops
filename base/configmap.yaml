apiVersion: v1
kind: ConfigMap
metadata:
  name: tea-shop-html
  namespace: tea-shop
data:
  index.html: |
    <!DOCTYPE html>
    <html>
    <head>
      <title>EHDF Tea Shop</title>
      <style>
        body {
          font-family: Arial, sans-serif;
          background: #f6f1e7;
          text-align: center;
          padding: 50px;
        }
        h1 {
          color: #6b4f2a;
        }
        .menu {
          margin-top: 30px;
          font-size: 20px;
        }
        .card {
          background: white;
          width: 300px;
          margin: 20px auto;
          padding: 20px;
          border-radius: 10px;
          box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
      </style>
    </head>
    <body>
      <h1>Welcome to EHDF Tea Shop</h1>
      <p>Fresh tea served from Argo CD on Kubernetes</p>
      <div class="menu">
        <div class="card">Karak Tea - AED 2</div>
        <div class="card">Masala Tea - AED 3</div>
        <div class="card">Green Tea - AED 2.5</div>
      </div>
    </body>
    </html>

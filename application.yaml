apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tea-shop
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://git@github.com:Joydevassy/tea-shop-gitops.git
    targetRevision: main
    path: base
  destination:
    server: https://kubernetes.default.svc
    namespace: tea-shop
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
